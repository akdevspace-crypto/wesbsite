<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- SEO Meta Tags -->
  <title>ARTIBOTS </title>
  <link rel="canonical" href="https://www.artibots.in/" />
  <meta name="description"
    content="ARTIBOTS is an Artificial Intelligence and Robotics company building the next generation of intelligent systems, automation platforms, and advanced robotics." />

  <meta name="robots" content="index, follow" />
  <meta name="author" content="Arun Jetly" />

  <!-- Performance Optimization: Preload Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  </noscript>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ARTIBOTS" />
  <meta property="og:url" content="https://www.artibots.in/" />
  <meta property="og:title" content="ARTIBOTS | Artificial Intelligence & Robotics" />
  <meta property="og:description"
    content="ARTIBOTS: Building the engine behind the intelligence. Advanced AI systems and Robotics." />
  <meta property="og:image" content="https://www.artibots.in/logo.svg" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://www.artibots.in/" />
  <meta property="twitter:title" content="ARTIBOTS | Artificial Intelligence & Robotics" />
  <meta property="twitter:description" content="Building the future of intelligent systems and robotics." />
  <meta property="twitter:image" content="%PUBLIC_URL%/logo.svg" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ARTIBOTS",
      "url": "https://www.artibots.in",
      "logo": "https://www.artibots.in/logo.svg",
      "founder": "ARUN JETLY",
      "description": "Artificial Intelligence and Robotics company focused on building intelligent systems, automation platforms, and advanced robotics technologies.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "India"
      }
    }
  </script>

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
